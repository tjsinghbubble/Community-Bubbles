name: Staging E2E

# Runs after every merge to develop — validates the live staging server
# before anyone tests on devices.
on:
  push:
    branches: [develop]

jobs:
  # Guard job: only proceed if STAGING_URL secret is configured.
  check:
    name: Check staging config
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.STAGING_URL }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "STAGING_URL secret is not set — skipping staging E2E run."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  staging-e2e:
    name: API E2E tests against staging
    needs: check
    if: needs.check.outputs.enabled == 'true'
    runs-on: ubuntu-latest

    permissions:
      statuses: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright E2E tests against staging server
        run: npx playwright test
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_URL }}

      - name: Post result as commit status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            const description = state === 'success'
              ? 'All E2E tests passed on staging'
              : 'E2E tests failed on staging — do not release';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              description,
              context: 'staging-e2e',
            });

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
