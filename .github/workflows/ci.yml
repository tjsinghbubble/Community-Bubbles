name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Unit + integration tests (no DB required) ──────────────────────────────
  unit:
    name: Type check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Server unit tests (Vitest)
        run: npx vitest run
        env:
          DATABASE_URL: postgresql://localhost/dummy-never-connects

      - name: Mobile unit tests (Jest)
        run: cd mobile && npm test -- --ci --passWithNoTests

  # ── API E2E tests — disabled until global-setup.ts + schema migration are wired up
  # e2e:
  #   name: API E2E tests (Playwright)
  #   ...re-enable once server/__tests__/e2e/global-setup.ts exists and drizzle
  #   schema push is added as a CI step before `npx playwright test`
