name: PR Title Lint

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

jobs:
  lint-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title is not empty
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if [ -z "$TITLE" ]; then
            echo "PR title cannot be empty"
            exit 1
          fi
          echo "PR title: $TITLE"
