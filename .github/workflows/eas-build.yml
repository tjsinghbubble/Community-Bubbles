name: EAS Production Build

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: eas-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Check tag follows vMAJOR.MINOR.PATCH semver format
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Tag '$TAG' does not follow the required vMAJOR.MINOR.PATCH format."
            echo "Example of a valid tag: v1.2.3"
            echo "Aborting — production EAS build will not run."
            exit 1
          fi
          echo "Tag '$TAG' is valid semver. Proceeding with build."

  build:
    name: EAS Build & Submit (Production)
    needs: release-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Sync version from git tag into app.json
        run: |
          jq --version

          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Syncing version $TAG_VERSION from tag $GITHUB_REF_NAME into app.json"
          jq --arg v "$TAG_VERSION" '.expo.version = $v' app.json > app.json.tmp
          mv app.json.tmp app.json
          echo "app.json version is now: $(jq -r '.expo.version' app.json)"

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production) and submit to App Store
        run: eas build --platform ios --profile production --non-interactive --wait --auto-submit
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build Android (production) and submit to Play Store
        run: eas build --platform android --profile production --non-interactive --wait --auto-submit
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
