name: EAS Development Build

on:
  pull_request:
    types: [opened, synchronize, reopened, converted_to_draft, labeled]

concurrency:
  group: eas-dev-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dev:
    name: EAS Build (Development)
    runs-on: ubuntu-latest
    # Run only when:
    #   • the PR is a draft, OR
    #   • the "needs-dev-build" label is present
    # Also skip forked PRs which cannot access repository secrets.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.event.pull_request.draft == true ||
        contains(github.event.pull_request.labels.*.name, 'needs-dev-build')
      )
    defaults:
      run:
        working-directory: mobile

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (development)
        id: build_ios
        continue-on-error: true
        run: |
          eas build \
            --platform ios \
            --profile development \
            --non-interactive \
            --wait \
            --json \
            > /tmp/eas_ios_dev.json
          BUILD_URL=$(jq -r '.[0].buildDetailsPageUrl // .[0].artifacts.buildUrl // ""' /tmp/eas_ios_dev.json)
          echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Build Android (development)
        id: build_android
        continue-on-error: true
        run: |
          eas build \
            --platform android \
            --profile development \
            --non-interactive \
            --wait \
            --json \
            > /tmp/eas_android_dev.json
          BUILD_URL=$(jq -r '.[0].buildDetailsPageUrl // .[0].artifacts.buildUrl // ""' /tmp/eas_android_dev.json)
          echo "build_url=${BUILD_URL}" >> "$GITHUB_OUTPUT"
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Post development build links as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const iosUrl     = '${{ steps.build_ios.outputs.build_url }}';
            const aosUrl     = '${{ steps.build_android.outputs.build_url }}';
            const iosSuccess = '${{ steps.build_ios.outcome }}' === 'success';
            const aosSuccess = '${{ steps.build_android.outcome }}' === 'success';
            const sha        = context.payload.pull_request.head.sha.slice(0, 7);
            const branch     = context.payload.pull_request.head.ref;

            const iosLine = iosSuccess && iosUrl
              ? `[🛠️ Install iOS dev build](${iosUrl})`
              : '❌ Build failed — check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            const aosLine = aosSuccess && aosUrl
              ? `[🛠️ Install Android dev build](${aosUrl})`
              : '❌ Build failed — check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            const body = [
              '## 🛠️ Development Builds',
              '',
              `Branch: \`${branch}\` | Commit: \`${sha}\``,
              '',
              '| Platform | Status |',
              '|----------|--------|',
              `| iOS      | ${iosLine} |`,
              `| Android  | ${aosLine} |`,
              '',
              '_Expo dev-client builds (internal distribution). Requires the **Expo Go** dev client or a matching dev build installed on the device._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## 🛠️ Development Builds')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
