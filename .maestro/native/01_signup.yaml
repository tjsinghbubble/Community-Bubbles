appId: ${APP_ID}
env:
  API_URL: http://api_host:3000
  METRO_HOST: metro_host
---
# Signup flow: creates a new account end-to-end.
#
# Prerequisites:
#   - Server running: npm run dev:local
#   - DB reset before this test if re-running: npm run db:reset-full:local
#   - Native dev build installed: npm run mobile:build:ios-sim
#   - Metro bundler running (started by mobile:build:ios-sim or npm run mobile:start)
#
# clearState wipes the stored Metro URL from the dev client, so we must
# immediately re-send the dev client deep link to reconnect it to Metro.

# Step 1: Pre-request OTP before touching the app
- runScript:
    file: ../scripts/request_otp.js
    env:
      API_URL: ${API_URL}

# Step 2: Launch app fresh and reconnect dev client to Metro
- launchApp:
    clearState: true
- openLink: "com.bubble.mobile://expo-development-client/?url=http%3A%2F%2F${METRO_HOST}%3A8081"

# Step 3: Navigate to signup
- tapOn: "Sign Up"

# Step 4: Fill in Legal name
- tapOn: "Full Name"
- inputText: "E2E Test User"

# Step 5: Select Gender
# - tapOn: "Please select one"
- tapOn: "Gender"
- tapOn: "Male"

# Step 6: Enter Date of Birth
- tapOn: "Birthdate"
- tapOn: "MM"
- inputText: "01"
- tapOn: "DD"
- inputText: "15"
- tapOn: "YYYY"
- inputText: "1990"
- tapOn: "Confirm"

# Step 7: Enter email (generated by runScript above)
- tapOn: "john.doe@gmail.com"
- inputText: ${email}

# Step 8: Enter password
- tapOn: "Create a password"
- inputText: "TestPass123!"

# Step 9: Submit the form
- tapOn: "Continue"

# Step 10: Dismiss the dev-mode alert that shows the OTP code
- assertVisible: "Development Mode"
- tapOn: "OK"

# Step 11: Enter the OTP code on the verification screen
- assertVisible: "Email Verification"
- tapOn:
    index: 0
- inputText: ${d0}
- inputText: ${d1}
- inputText: ${d2}
- inputText: ${d3}
- inputText: ${d4}
- inputText: ${d5}
- tapOn: "Verify"

# Step 12: Select at least 3 interests
- assertVisible: "Sports"
- tapOn: "Sports"
- tapOn: "Music"
- tapOn: "Tech"
- tapOn: "Continue"

# Step 13: Accept community guidelines and complete signup
- assertVisible: "Community Guidelines"
- tapOn: "I agree to follow these community guidelines"
- tapOn: "Get Started"

# Step 14: Confirm we reached the main app
- assertVisible: "Explore"
